apiVersion: v1
kind: Service
metadata:
  name: stepwise-ai-service
  namespace: stepwise-ai
  labels:
    app: stepwise-ai
    component: app
spec:
  type: ClusterIP
  selector:
    app: stepwise-ai
    component: app
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: stepwise-ai
  labels:
    app: stepwise-ai
    component: redis
spec:
  type: ClusterIP
  selector:
    app: stepwise-ai
    component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
