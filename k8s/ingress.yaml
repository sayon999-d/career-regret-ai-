apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stepwise-ai-ingress
  namespace: stepwise-ai
  labels:
    app: stepwise-ai
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - stepwise-ai.example.com
      secretName: stepwise-ai-tls
  rules:
    - host: stepwise-ai.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stepwise-ai-service
                port:
                  number: 80
