apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stepwise-ai-data-pvc
  namespace: stepwise-ai
  labels:
    app: stepwise-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stepwise-ai-exports-pvc
  namespace: stepwise-ai
  labels:
    app: stepwise-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stepwise-ai-redis-pvc
  namespace: stepwise-ai
  labels:
    app: stepwise-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
