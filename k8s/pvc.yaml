apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: career-ai-data-pvc
  namespace: career-ai
  labels:
    app: career-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: career-ai-exports-pvc
  namespace: career-ai
  labels:
    app: career-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: career-ai-redis-pvc
  namespace: career-ai
  labels:
    app: career-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
